<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="theme-color" content="#00D4FF" />
  <title>EntangleWealth — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #020204;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 420px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      border-radius: 20px;
      background: rgba(0,212,255,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; }
    h1 {
      font-size: 28px; font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00D4FF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: rgba(255,255,255,0.6); font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: linear-gradient(135deg, #00D4FF, #0099cc);
      color: #000; border: none; border-radius: 12px;
      padding: 14px 32px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .pulse {
      width: 12px; height: 12px; border-radius: 50%;
      background: #ff3366; margin: 0 auto 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pulse"></div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>EntangleWealth needs an internet connection to fetch live market data and signals. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
